# Local dev stack — boots a current GeoServer + PostGIS for use with `make test-integration`.
# For the LTS test leg (GeoServer 2.27), see docker-compose.test.yml.

services:
  geoserver:
    image: geoserver-dev:${GEOSERVER_VERSION:-2.28.0}
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        GEOSERVER_VERSION: ${GEOSERVER_VERSION:-2.28.0}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - docker/env/geoserver.env
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/geoserver/web/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: golang
      POSTGRES_PASSWORD: golang
    ports:
      - "5436:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golang -d gis"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgis-data:
