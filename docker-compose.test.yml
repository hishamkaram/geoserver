# Integration test stack pinned to the GeoServer 2.27 LTS leg.
# Used by CI's matrix integration job and locally via `make compose-test-up`.

services:
  geoserver:
    image: geoserver-test:${GEOSERVER_VERSION:-2.27.4}
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        GEOSERVER_VERSION: ${GEOSERVER_VERSION:-2.27.4}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - docker/env/geoserver.env
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/geoserver/web/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: golang
      POSTGRES_PASSWORD: golang
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golang -d gis"]
      interval: 5s
      timeout: 5s
      retries: 20
