name: Integration tests

# Integration tests boot a real GeoServer + PostGIS via docker compose and
# exercise the package against it. They are MANDATORY on every PR targeting
# master: the matrix runs both GeoServer 2.27.4 LTS and 2.28.0 stable, and
# both legs must pass for the PR to merge. The same workflow also runs on
# demand, on a weekly schedule, and on release tags.

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      geoserver:
        description: GeoServer version to test against
        required: false
        default: "2.28.0"
        type: choice
        options:
          - "2.27.4"
          - "2.28.0"
  schedule:
    # Sundays at 03:17 UTC — outside common deploy windows.
    - cron: "17 3 * * 0"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  # Cancel stale runs on the same PR (push churn). Don't cancel scheduled
  # or release-tag runs — those should always complete.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix:
    name: GeoServer ${{ matrix.geoserver }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        geoserver: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.geoserver)) || fromJSON('["2.27.4", "2.28.0"]') }}
    env:
      GEOSERVER_VERSION: ${{ matrix.geoserver }}
      GEOSERVER_URL: http://localhost:8080/geoserver/
      GEOSERVER_USER: admin
      GEOSERVER_PASS: geoserver
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Boot GeoServer + PostGIS
        run: docker compose up -d --wait --wait-timeout=420

      - name: Show GeoServer version
        run: |
          curl -fsS -u ${GEOSERVER_USER}:${GEOSERVER_PASS} "${GEOSERVER_URL}rest/about/version.json" | head -c 1024 || true

      - name: Run integration tests
        run: go test -race -tags=integration -timeout=15m ./...

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color --tail=400

      - name: Tear down
        if: always()
        run: docker compose down -v
