name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: read-all

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release needs this to publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Verify build
        run: |
          go mod verify
          go vet ./...
          go test -race -short ./...

      - name: Extract release notes for ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag='${{ github.ref_name }}'
          version="${tag#v}"
          awk -v version="$version" '
            $0 ~ "^## \\["version"\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG stanza found for [$version] (tag $tag) in CHANGELOG.md; refusing to publish a release with empty body."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: false
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
